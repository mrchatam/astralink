CONFIG_VERSION = 1
TRANSPORT = "multipath_quic_dns"
MODE = "advanced"

DOMAINS = ["t.example.com"]
DATA_ENCRYPTION_METHOD = 2
ENCRYPTION_KEY = ""

PROTOCOL_TYPE = "SOCKS5"
LISTEN_IP = "127.0.0.1"
LISTEN_PORT = 18000

MAX_ACTIVE_PATHS = 4
MAX_STANDBY_PATHS = 2
FEC_ENABLED = true
FEC_DATA_SHARDS = 4
FEC_PARITY_SHARDS = 1
PACKET_DUPLICATION_COUNT = 2
SETUP_PACKET_DUPLICATION_COUNT = 3
CONGESTION_PROFILE = "adaptive"
MAX_BUNDLE_BYTES = 1200
RESOLVER_BALANCING_STRATEGY = 5

AUTHORITY_ENDPOINTS = ["ns1.example.com:53", "ns2.example.com:53"]

LOG_LEVEL = "INFO"
